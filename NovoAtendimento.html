<script>
/* ============================================================
   Pages.novoAtendimento — Cadastro e edição de atendimentos
   ------------------------------------------------------------
   GUIA PARA QUEM ESTÁ COMEÇANDO
   Esta é a tela de formulário usada tanto para CRIAR um atendimento novo
   quanto para EDITAR um já existente. Qual dos dois modos está ativo
   depende do parâmetro "atendimentoId" recebido em render(): se vier um
   id, a tela carrega os dados desse atendimento; se vier vazio/nulo, a
   tela abre em branco para um cadastro novo.

   Campos do formulário: Data, Protocolo, Nome, CPF, Produto, Canal, Status,
   "Aguardando Retorno de" (só visível quando Status = "Pendente") e
   Observações. O campo "Responsável" só aparece para o perfil Supervisor
   (analista nunca escolhe responsável — o sistema identifica
   automaticamente quem criou o atendimento, em Services.gs/getActor_()).

   Funções que começam com "_" são de uso interno da própria página.
   Fluxo resumido:
     render(id)                 → se tiver id, busca o atendimento no
                                   servidor; depois chama _renderForm().
     _renderForm(container)      → desenha todos os campos do formulário.
     _bindEvents()                → liga os eventos dos campos (mudar
                                   status mostra/esconde "Aguardando
                                   Retorno de").
     _validarFormulario()         → confere se os campos obrigatórios
                                   foram preenchidos antes de salvar.
     _coletarDados()              → junta os valores dos campos da tela
                                   em um objeto para enviar ao servidor.
     _salvar()                    → chama salvarAtendimento() ou
                                   atualizarAtendimento() (Services.gs),
                                   dependendo se é um cadastro novo ou
                                   uma edição.
     _adicionarObservacao()       → registra uma nova observação na
                                   timeline do atendimento.
   ============================================================ */
Pages.novoAtendimento = {
  state: {
    atendimentoId: null,
    atendimento: null,
    timeline: [],
    salvando: false
  },

  render: function(atendimentoId) {
    var self = this;
    self.state.atendimentoId = atendimentoId || null;
    self.state.atendimento = null;
    self.state.timeline = [];
    self.state.salvando = false;

    var container = document.getElementById('content-area') || document.querySelector('.content-area');
    if (!container) return;

    if (atendimentoId) {
      Components.showLoading('Carregando atendimento...');
      google.script.run
        .withSuccessHandler(function(result) {
          Components.hideLoading();
          if (result && result.atendimento) {
            self.state.atendimento = result.atendimento;
            self.state.timeline = result.timeline || [];
            self._renderForm(container);
          } else {
            Components.toast('Atendimento não encontrado.', 'danger');
            App.navigateTo('atendimentos');
          }
        })
        .withFailureHandler(function(err) {
          Components.hideLoading();
          Components.toast('Erro ao carregar atendimento: ' + err.message, 'danger');
          App.navigateTo('atendimentos');
        })
        .getAtendimento(atendimentoId);
    } else {
      self._renderForm(container);
    }
  },

  _renderForm: function(container) {
    var self = this;
    var isEdit = !!self.state.atendimentoId;
    var atd = self.state.atendimento || {};
    var dd = App.dropdownData || {};
    var isSupervisor = self._isSupervisor();

    var hoje = new Date().toISOString().split('T')[0];
    var dataAbertura = atd.dataAbertura ? self._formatDateForInput(atd.dataAbertura) : hoje;
    var statusAtual = atd.status || (dd.status || [])[0] || '';

    var titulo = isEdit ? 'Editar Atendimento #' + self.state.atendimentoId : 'Novo Atendimento';

    var html = '';
    html += '<div class="page-header">';
    html += '  <h1 class="page-title">' + titulo + '</h1>';
    html += '</div>';

    html += '<div class="card">';
    html += '  <form id="form-atendimento" autocomplete="off">';

    // Linha 1: Data + Protocolo
    html += '  <div class="form-row">';
    html += '    <div class="form-group">';
    html += '      <label class="form-label" for="campo-data-abertura">Data <span style="color:var(--danger)">*</span></label>';
    html += '      <input type="date" id="campo-data-abertura" class="form-control" value="' + dataAbertura + '" required>';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label" for="campo-ra">Protocolo <span style="color:var(--danger)">*</span></label>';
    html += '      <input type="text" id="campo-ra" class="form-control" placeholder="Número do protocolo" value="' + self._escape(atd.numeroRA || '') + '" required>';
    html += '      <small id="ra-feedback" style="display:none;font-size:12px;margin-top:4px;"></small>';
    html += '    </div>';
    html += '  </div>';

    // Linha 2: Nome + CPF
    html += '  <div class="form-row">';
    html += '    <div class="form-group">';
    html += '      <label class="form-label" for="campo-cliente">Nome <span style="color:var(--danger)">*</span></label>';
    html += '      <input type="text" id="campo-cliente" class="form-control" placeholder="Nome do cliente" value="' + self._escape(atd.cliente || '') + '" required>';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label" for="campo-cpf">CPF</label>';
    html += '      <input type="text" id="campo-cpf" class="form-control" placeholder="000.000.000-00" value="' + self._escape(atd.cpf || '') + '" maxlength="14">';
    html += '      <small id="cpf-feedback" style="display:none;font-size:12px;margin-top:4px;"></small>';
    html += '    </div>';
    html += '  </div>';

    // Linha 3: Produto + Canal
    html += '  <div class="form-row">';
    html += '    <div class="form-group">';
    html += '      <label class="form-label" for="campo-produto">Produto <span style="color:var(--danger)">*</span></label>';
    html += '      <select id="campo-produto" class="form-control" required>';
    html += '        <option value="">Selecione</option>';
    if (dd.produtos) {
      dd.produtos.forEach(function(p) {
        var sel = (atd.produto === p) ? ' selected' : '';
        html += '        <option value="' + self._escape(p) + '"' + sel + '>' + self._escape(p) + '</option>';
      });
    }
    html += '      </select>';
    html += '    </div>';
    html += '    <div class="form-group">';
    html += '      <label class="form-label" for="campo-canal">Canal <span style="color:var(--danger)">*</span></label>';
    html += '      <select id="campo-canal" class="form-control" required>';
    html += '        <option value="">Selecione</option>';
    if (dd.canais) {
      dd.canais.forEach(function(c) {
        var sel = (atd.canal === c) ? ' selected' : '';
        html += '        <option value="' + self._escape(c) + '"' + sel + '>' + self._escape(c) + '</option>';
      });
    }
    html += '      </select>';
    html += '    </div>';
    html += '  </div>';

    // Linha 4: Status + Aguardando Retorno de
    html += '  <div class="form-row">';
    html += '    <div class="form-group">';
    html += '      <label class="form-label" for="campo-status">Status <span style="color:var(--danger)">*</span></label>';
    html += '      <select id="campo-status" class="form-control" required>';
    if (dd.status) {
      dd.status.forEach(function(s) {
        var sel = (statusAtual === s) ? ' selected' : '';
        html += '        <option value="' + self._escape(s) + '"' + sel + '>' + self._escape(s) + '</option>';
      });
    }
    html += '      </select>';
    html += '    </div>';
    html += '    <div class="form-group" id="grupo-motivo-pendencia" style="' + (self._isStatusPendente(statusAtual) ? '' : 'display:none;') + '">';
    html += '      <label class="form-label" for="campo-motivo-pendencia">Aguardando Retorno de <span style="color:var(--danger)">*</span></label>';
    html += '      <select id="campo-motivo-pendencia" class="form-control">';
    html += '        <option value="">Selecione</option>';
    if (dd.motivosPendencia) {
      dd.motivosPendencia.forEach(function(m) {
        var sel = (atd.motivoPendencia === m) ? ' selected' : '';
        html += '        <option value="' + self._escape(m) + '"' + sel + '>' + self._escape(m) + '</option>';
      });
    }
    html += '      </select>';
    html += '    </div>';
    html += '  </div>';

    // Responsável: exceção visível apenas para Supervisor (escolhe o analista).
    // Analista não vê este campo — o sistema identifica o criador automaticamente.
    if (isSupervisor) {
      html += '  <div class="form-row" data-supervisor-only>';
      html += '    <div class="form-group">';
      html += '      <label class="form-label" for="campo-responsavel">Responsável</label>';
      html += '      <select id="campo-responsavel" class="form-control">';
      html += '        <option value="">Automático (eu mesmo)</option>';
      if (dd.responsaveis) {
        dd.responsaveis.forEach(function(r) {
          var sel = (atd.responsavel === r) ? ' selected' : '';
          html += '        <option value="' + self._escape(r) + '"' + sel + '>' + self._escape(r) + '</option>';
        });
      }
      html += '      </select>';
      html += '      <small style="color:var(--text-secondary);font-size:12px;margin-top:4px;display:block;">Somente supervisores escolhem o analista responsável.</small>';
      html += '    </div>';
      html += '    <div class="form-group"></div>';
      html += '  </div>';
    }

    // Observações
    html += '  <div class="form-group">';
    html += '    <label class="form-label" for="campo-observacoes">Observações</label>';
    html += '    <textarea id="campo-observacoes" class="form-control" rows="4" placeholder="Observações sobre o atendimento (opcional)">' + self._escape(atd.observacoes || '') + '</textarea>';
    html += '  </div>';

    // Botões de ação
    html += '  <div class="form-actions">';
    html += '    <button type="button" id="btn-salvar-atendimento" class="btn btn-primary">💾 Salvar</button>';
    if (isEdit) {
      html += '    <button type="button" id="btn-cancelar-atendimento" class="btn btn-secondary">Cancelar</button>';
      html += '    <button type="button" id="btn-excluir-atendimento" class="btn btn-danger" style="margin-left:auto;">🗑 Excluir Atendimento</button>';
    } else {
      html += '    <button type="button" id="btn-limpar-atendimento" class="btn btn-secondary">Limpar</button>';
    }
    html += '  </div>';

    html += '  </form>';
    html += '</div>';

    // Seção de Adicionar Observação (somente edição)
    if (isEdit) {
      html += '<div class="card" style="margin-top:20px;">';
      html += '  <h3 style="margin-bottom:16px;font-size:16px;font-weight:600;">Adicionar Observação</h3>';
      html += '  <div class="form-group">';
      html += '    <textarea id="campo-nova-observacao" class="form-control" rows="3" placeholder="Digite uma observação para adicionar ao histórico..."></textarea>';
      html += '  </div>';
      html += '  <div class="form-actions">';
      html += '    <button type="button" id="btn-adicionar-observacao" class="btn btn-primary btn-sm">📝 Adicionar Observação</button>';
      html += '  </div>';
      html += '</div>';
    }

    // Timeline (somente edição)
    if (isEdit && self.state.timeline && self.state.timeline.length > 0) {
      html += '<div class="card" style="margin-top:20px;">';
      html += '  <h3 style="margin-bottom:16px;font-size:16px;font-weight:600;">Histórico do Atendimento</h3>';
      html += '  <div id="timeline-container">';
      html += Components.timeline(self.state.timeline);
      html += '  </div>';
      html += '</div>';
    } else if (isEdit) {
      html += '<div class="card" style="margin-top:20px;">';
      html += '  <h3 style="margin-bottom:16px;font-size:16px;font-weight:600;">Histórico do Atendimento</h3>';
      html += Components.emptyState('📋', 'Nenhum registro no histórico.');
      html += '</div>';
    }

    container.innerHTML = html;

    // Vincular eventos
    self._bindEvents();
  },

  _bindEvents: function() {
    var self = this;

    // Máscara CPF
    var campoCpf = document.getElementById('campo-cpf');
    if (campoCpf) {
      campoCpf.addEventListener('input', function() {
        App.maskCPF(this);
      });
      campoCpf.addEventListener('blur', function() {
        self._validarCPF(this.value);
      });
    }

    // Verificar duplicidade do Protocolo
    var campoRA = document.getElementById('campo-ra');
    if (campoRA) {
      campoRA.addEventListener('blur', function() {
        self._verificarDuplicidadeRA(this.value);
      });
    }

    // Status muda → mostrar/esconder "Aguardando Retorno de" (só aparece em "Pendente")
    var campoStatus = document.getElementById('campo-status');
    if (campoStatus) {
      campoStatus.addEventListener('change', function() {
        var grupoMotivo = document.getElementById('grupo-motivo-pendencia');
        if (grupoMotivo) {
          if (self._isStatusPendente(this.value)) {
            grupoMotivo.style.display = '';
          } else {
            grupoMotivo.style.display = 'none';
            var campoMotivo = document.getElementById('campo-motivo-pendencia');
            if (campoMotivo) campoMotivo.value = '';
          }
        }
      });
    }

    // Botão Salvar
    var btnSalvar = document.getElementById('btn-salvar-atendimento');
    if (btnSalvar) {
      btnSalvar.addEventListener('click', function() {
        self._salvar();
      });
    }

    // Botão Limpar (novo)
    var btnLimpar = document.getElementById('btn-limpar-atendimento');
    if (btnLimpar) {
      btnLimpar.addEventListener('click', function() {
        self._limparFormulario();
      });
    }

    // Botão Cancelar (edição)
    var btnCancelar = document.getElementById('btn-cancelar-atendimento');
    if (btnCancelar) {
      btnCancelar.addEventListener('click', function() {
        App.navigateTo('atendimentos');
      });
    }

    // Botão Excluir (edição)
    var btnExcluir = document.getElementById('btn-excluir-atendimento');
    if (btnExcluir) {
      btnExcluir.addEventListener('click', function() {
        Components.confirm('Tem certeza que deseja excluir este atendimento? Esta ação não poderá ser desfeita.', function() {
          self._excluir();
        });
      });
    }

    // Botão Adicionar Observação
    var btnObservacao = document.getElementById('btn-adicionar-observacao');
    if (btnObservacao) {
      btnObservacao.addEventListener('click', function() {
        self._adicionarObservacao();
      });
    }
  },

  _verificarDuplicidadeRA: function(valor) {
    if (!valor || !valor.trim()) return;
    var self = this;
    var feedback = document.getElementById('ra-feedback');

    google.script.run
      .withSuccessHandler(function(resultados) {
        if (!feedback) return;
        if (resultados && resultados.length > 0) {
          var isDuplicata = resultados.some(function(r) {
            if (self.state.atendimentoId && r.id === self.state.atendimentoId) return false;
            return r.numeroRA === valor.trim();
          });
          if (isDuplicata) {
            feedback.style.display = 'block';
            feedback.style.color = 'var(--warning)';
            feedback.textContent = '⚠️ Já existe um atendimento com este número RA.';
          } else {
            feedback.style.display = 'none';
            feedback.textContent = '';
          }
        } else {
          feedback.style.display = 'none';
          feedback.textContent = '';
        }
      })
      .withFailureHandler(function() {
        if (feedback) {
          feedback.style.display = 'none';
          feedback.textContent = '';
        }
      })
      .pesquisarAtendimentos(valor.trim());
  },

  _validarCPF: function(cpf) {
    var feedback = document.getElementById('cpf-feedback');
    if (!feedback) return;
    if (!cpf || !cpf.trim()) {
      feedback.style.display = 'none';
      return;
    }

    var cpfLimpo = cpf.replace(/\D/g, '');

    if (cpfLimpo.length !== 11) {
      feedback.style.display = 'block';
      feedback.style.color = 'var(--danger)';
      feedback.textContent = '❌ CPF deve conter 11 dígitos.';
      return;
    }

    // Verificar CPFs com todos dígitos iguais
    if (/^(\d)\1{10}$/.test(cpfLimpo)) {
      feedback.style.display = 'block';
      feedback.style.color = 'var(--danger)';
      feedback.textContent = '❌ CPF inválido.';
      return;
    }

    // Validação dos dígitos verificadores
    var soma = 0;
    for (var i = 0; i < 9; i++) {
      soma += parseInt(cpfLimpo.charAt(i)) * (10 - i);
    }
    var resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;
    if (resto !== parseInt(cpfLimpo.charAt(9))) {
      feedback.style.display = 'block';
      feedback.style.color = 'var(--danger)';
      feedback.textContent = '❌ CPF inválido.';
      return;
    }

    soma = 0;
    for (var j = 0; j < 10; j++) {
      soma += parseInt(cpfLimpo.charAt(j)) * (11 - j);
    }
    resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;
    if (resto !== parseInt(cpfLimpo.charAt(10))) {
      feedback.style.display = 'block';
      feedback.style.color = 'var(--danger)';
      feedback.textContent = '❌ CPF inválido.';
      return;
    }

    feedback.style.display = 'block';
    feedback.style.color = 'var(--success)';
    feedback.textContent = '✅ CPF válido.';
  },

  _isSupervisor: function() {
    var allowed = ['supervisor', 'gestor', 'administrador', 'admin'];
    var profile = String((App.user || {}).perfil || '').toLowerCase();
    return allowed.indexOf(profile) !== -1;
  },

  _isStatusPendente: function(status) {
    if (!status) return false;
    return status.toLowerCase().indexOf('pendente') !== -1;
  },

  _validarFormulario: function() {
    var erros = [];

    var dataAbertura = document.getElementById('campo-data-abertura');
    var ra = document.getElementById('campo-ra');
    var cliente = document.getElementById('campo-cliente');
    var produto = document.getElementById('campo-produto');
    var canal = document.getElementById('campo-canal');
    var status = document.getElementById('campo-status');
    var motivoPendencia = document.getElementById('campo-motivo-pendencia');

    if (!dataAbertura || !dataAbertura.value) erros.push('Data é obrigatória.');
    if (!ra || !ra.value.trim()) erros.push('Protocolo é obrigatório.');
    if (!cliente || !cliente.value.trim()) erros.push('Nome é obrigatório.');
    if (!produto || !produto.value) erros.push('Produto é obrigatório.');
    if (!canal || !canal.value) erros.push('Canal é obrigatório.');
    if (!status || !status.value) erros.push('Status é obrigatório.');

    if (status && this._isStatusPendente(status.value)) {
      if (!motivoPendencia || !motivoPendencia.value) {
        erros.push('"Aguardando Retorno de" é obrigatório quando o Status é "Pendente".');
      }
    }

    // Validar CPF se preenchido
    var cpf = document.getElementById('campo-cpf');
    if (cpf && cpf.value.trim()) {
      var cpfLimpo = cpf.value.replace(/\D/g, '');
      if (cpfLimpo.length !== 11) {
        erros.push('CPF informado é inválido.');
      }
    }

    return erros;
  },

  _coletarDados: function() {
    var campoResponsavel = document.getElementById('campo-responsavel');
    var campoMotivo = document.getElementById('campo-motivo-pendencia');
    return {
      numeroRA: (document.getElementById('campo-ra').value || '').trim(),
      cliente: (document.getElementById('campo-cliente').value || '').trim(),
      cpf: (document.getElementById('campo-cpf').value || '').trim(),
      produto: document.getElementById('campo-produto').value || '',
      canal: document.getElementById('campo-canal').value || '',
      status: document.getElementById('campo-status').value || '',
      observacoes: (document.getElementById('campo-observacoes').value || '').trim(),
      dataAbertura: document.getElementById('campo-data-abertura').value || '',
      motivoPendencia: campoMotivo ? (campoMotivo.value || '') : '',
      responsavel: campoResponsavel ? (campoResponsavel.value || '') : ''
    };
  },

  _salvar: function() {
    var self = this;
    if (self.state.salvando) return;

    var erros = self._validarFormulario();
    if (erros.length > 0) {
      Components.toast(erros.join('\n'), 'danger', 5000);
      return;
    }

    var dados = self._coletarDados();
    self.state.salvando = true;

    var btnSalvar = document.getElementById('btn-salvar-atendimento');
    if (btnSalvar) {
      btnSalvar.disabled = true;
      btnSalvar.textContent = '⏳ Salvando...';
    }

    Components.showLoading('Salvando atendimento...');

    if (self.state.atendimentoId) {
      // Edição: solicitar justificativa
      var justificativa = '';
      Components.modal({
        title: 'Justificativa da Alteração',
        body: '<div class="form-group"><label class="form-label">Descreva o motivo da alteração:</label><textarea id="campo-justificativa" class="form-control" rows="3" placeholder="Informe o motivo da edição..."></textarea></div>',
        confirmText: 'Confirmar',
        cancelText: 'Cancelar',
        type: 'default',
        onConfirm: function() {
          var campoJust = document.getElementById('campo-justificativa');
          justificativa = campoJust ? campoJust.value.trim() : '';
          if (!justificativa) {
            Components.toast('Justificativa é obrigatória para alterações.', 'warning');
            self.state.salvando = false;
            if (btnSalvar) {
              btnSalvar.disabled = false;
              btnSalvar.textContent = '💾 Salvar';
            }
            Components.hideLoading();
            return;
          }
          google.script.run
            .withSuccessHandler(function(result) {
              Components.hideLoading();
              self.state.salvando = false;
              if (btnSalvar) {
                btnSalvar.disabled = false;
                btnSalvar.textContent = '💾 Salvar';
              }
              if (result && result.success) {
                Components.toast('Atendimento atualizado com sucesso!', 'success');
                App.navigateTo('atendimentos');
              } else {
                Components.toast(result.message || 'Erro ao atualizar atendimento.', 'danger');
              }
            })
            .withFailureHandler(function(err) {
              Components.hideLoading();
              self.state.salvando = false;
              if (btnSalvar) {
                btnSalvar.disabled = false;
                btnSalvar.textContent = '💾 Salvar';
              }
              Components.toast('Erro ao atualizar: ' + err.message, 'danger');
            })
            .atualizarAtendimento(self.state.atendimentoId, dados, justificativa);
        },
        onCancel: function() {
          self.state.salvando = false;
          if (btnSalvar) {
            btnSalvar.disabled = false;
            btnSalvar.textContent = '💾 Salvar';
          }
          Components.hideLoading();
        }
      });
    } else {
      // Novo atendimento
      google.script.run
        .withSuccessHandler(function(result) {
          Components.hideLoading();
          self.state.salvando = false;
          if (btnSalvar) {
            btnSalvar.disabled = false;
            btnSalvar.textContent = '💾 Salvar';
          }
          if (result && result.success) {
            Components.toast('Atendimento #' + result.id + ' criado com sucesso!', 'success');
            App.navigateTo('atendimentos');
          } else {
            Components.toast(result.message || 'Erro ao salvar atendimento.', 'danger');
          }
        })
        .withFailureHandler(function(err) {
          Components.hideLoading();
          self.state.salvando = false;
          if (btnSalvar) {
            btnSalvar.disabled = false;
            btnSalvar.textContent = '💾 Salvar';
          }
          Components.toast('Erro ao salvar: ' + err.message, 'danger');
        })
        .salvarAtendimento(dados);
    }
  },

  _excluir: function() {
    var self = this;
    Components.showLoading('Excluindo atendimento...');

    google.script.run
      .withSuccessHandler(function(result) {
        Components.hideLoading();
        if (result && result.success) {
          Components.toast('Atendimento excluído com sucesso.', 'success');
          App.navigateTo('atendimentos');
        } else {
          Components.toast(result.message || 'Erro ao excluir atendimento.', 'danger');
        }
      })
      .withFailureHandler(function(err) {
        Components.hideLoading();
        Components.toast('Erro ao excluir: ' + err.message, 'danger');
      })
      .excluirAtendimento(self.state.atendimentoId);
  },

  _adicionarObservacao: function() {
    var self = this;
    var campo = document.getElementById('campo-nova-observacao');
    if (!campo || !campo.value.trim()) {
      Components.toast('Digite uma observação antes de adicionar.', 'warning');
      return;
    }

    var texto = campo.value.trim();
    Components.showLoading('Adicionando observação...');

    google.script.run
      .withSuccessHandler(function(result) {
        Components.hideLoading();
        if (result && result.success) {
          Components.toast('Observação adicionada com sucesso!', 'success');
          campo.value = '';
          // Recarregar timeline
          self._recarregarTimeline();
        } else {
          Components.toast('Erro ao adicionar observação.', 'danger');
        }
      })
      .withFailureHandler(function(err) {
        Components.hideLoading();
        Components.toast('Erro ao adicionar observação: ' + err.message, 'danger');
      })
      .adicionarObservacao(self.state.atendimentoId, texto);
  },

  _recarregarTimeline: function() {
    var self = this;
    google.script.run
      .withSuccessHandler(function(timeline) {
        self.state.timeline = timeline || [];
        var container = document.getElementById('timeline-container');
        if (container) {
          if (self.state.timeline.length > 0) {
            container.innerHTML = Components.timeline(self.state.timeline);
          } else {
            container.innerHTML = Components.emptyState('📋', 'Nenhum registro no histórico.');
          }
        }
      })
      .withFailureHandler(function(err) {
        console.error('Erro ao recarregar timeline:', err);
      })
      .getTimeline(self.state.atendimentoId);
  },

  _limparFormulario: function() {
    var form = document.getElementById('form-atendimento');
    if (form) form.reset();

    // Restaurar data de abertura para hoje
    var campoData = document.getElementById('campo-data-abertura');
    if (campoData) {
      campoData.value = new Date().toISOString().split('T')[0];
    }

    // Esconder "Aguardando Retorno de"
    var grupoMotivo = document.getElementById('grupo-motivo-pendencia');
    if (grupoMotivo) grupoMotivo.style.display = 'none';

    // Limpar feedbacks
    var raFeedback = document.getElementById('ra-feedback');
    if (raFeedback) { raFeedback.style.display = 'none'; raFeedback.textContent = ''; }
    var cpfFeedback = document.getElementById('cpf-feedback');
    if (cpfFeedback) { cpfFeedback.style.display = 'none'; cpfFeedback.textContent = ''; }

    Components.toast('Formulário limpo.', 'success', 2000);
  },

  _formatDateForInput: function(dateValue) {
    if (!dateValue) return '';
    try {
      var d = new Date(dateValue);
      if (isNaN(d.getTime())) return '';
      var year = d.getFullYear();
      var month = ('0' + (d.getMonth() + 1)).slice(-2);
      var day = ('0' + d.getDate()).slice(-2);
      return year + '-' + month + '-' + day;
    } catch (e) {
      return '';
    }
  },

  _escape: function(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }
};
</script>
